<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia BW | Agendamento Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <header>
        <div class="header-eyebrow">Agendamento Online</div>
        <h1>BARBEARIA BW</h1>
        <p>Rua José Narciso Silva, 997 — Fábricas</p>
    </header>

    <main id="lista-servicos">
        <!-- Serviços carregados dinamicamente do Supabase -->
    </main>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Agendar</h2>
            <span class="close-modal" id="closeModal">&times;</span>
        </div>

        <div class="summary-box">
            <div><h3 id="resumo-servico">Corte Degradê</h3><p id="resumo-detalhes">40m • R$ 35,00</p></div>
        </div>

        <div class="calendar-wrapper">
            <!-- FIX #6: month-label agora é gerado dinamicamente pelo JS -->
            <div class="month-label" id="monthLabel"></div>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="input-row">
            <label class="label-p">Escolha o Barbeiro</label>
            <div class="barber-carousel" id="barberPicker">
                <div class="barber-card active" data-barber="Joao Victor" onclick="selectBarber(this)">
                    <div class="barber-card-avatar">JV</div>
                    <div class="barber-card-name">João Victor</div>
                    <div class="barber-card-role">Principal</div>
                    <div class="barber-card-dot"></div>
                </div>
                <div class="barber-card" data-barber="Cristo" onclick="selectBarber(this)">
                    <div class="barber-card-avatar">CR</div>
                    <div class="barber-card-name">Cristo</div>
                    <div class="barber-card-role">Barbeiro</div>
                    <div class="barber-card-dot"></div>
                </div>
            </div>
            <input type="hidden" id="selectProf" value="Joao Victor">
        </div>

        <div class="input-group">
            <input type="text" id="userObs" placeholder="Adicionar Observações">
        </div>
        
        <div class="section-title">Horários Disponíveis</div>
        <div id="timeGrid" class="time-grid"></div>

        <div id="area-cliente" style="display: none; border-top: 1px solid #2a2a2a; padding-top: 20px;">
            <div class="input-group"><label>Seu Nome</label><input type="text" id="userName"></div>
            <div class="input-group"><label>Seu E-mail</label><input type="email" id="userEmail" placeholder="Para confirmação"></div>
            <div class="input-group"><label>Seu WhatsApp</label><input type="tel" id="userPhone" placeholder="(32) 9 9999-9999"></div>
            <button class="btn-confirm" id="btnFinalizar">Confirmar Agendamento</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
