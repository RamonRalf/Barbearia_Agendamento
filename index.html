<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BarberApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/png" href="./icone.png"/>
<link rel="apple-touch-icon" href="./icone.png"/>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#111110"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BarberApp"/>
<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW registrado'))
      .catch(e=>console.log('SW erro:',e))
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;--white:#ffffff;--black:#111110;
  --gray-1:#f4f4f0;--gray-2:#e8e8e2;--gray-3:#c8c8c0;--gray-4:#888880;--gray-5:#555550;
  --success:#2d6a2d;--success-bg:#e8f5e8;--warn:#8a5c00;--warn-bg:#fff3d6;
  --danger:#8a2020;--danger-bg:#fde8e8;
  --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05)
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--black);-webkit-font-smoothing:antialiased}

/* VIEWS */
.view{display:none;min-height:100vh}
.view.active{display:block}
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);padding:2rem}
#auth.active{display:flex}
#barber{display:none;min-height:100vh}
#barber.active{display:flex}

/* LANDING */
#landing{background:var(--white)}
.l-nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 5%;border-bottom:1px solid var(--gray-2);position:sticky;top:0;background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);z-index:100}
.l-logo{font-family:var(--serif);font-size:1.5rem;font-weight:600}
.l-nav-btns{display:flex;gap:10px}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;padding:7rem 5%;max-width:1200px;margin:0 auto}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--gray-1);color:var(--gray-5);padding:5px 14px;border-radius:99px;font-size:0.78rem;font-weight:500;margin-bottom:1.5rem;letter-spacing:0.02em}
.hero h1{font-family:var(--serif);font-size:3.8rem;font-weight:300;line-height:1.1;margin-bottom:1.25rem}
.hero h1 em{font-style:italic;color:var(--gray-4)}
.hero-sub{font-size:1.05rem;color:var(--gray-4);line-height:1.7;margin-bottom:2.5rem;max-width:420px}
.hero-ctas{display:flex;gap:12px}
.hero-card{background:var(--gray-1);border:1px solid var(--gray-2);border-radius:20px;padding:2rem;display:flex;flex-direction:column;gap:10px}
.hc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hc-header span{font-size:0.78rem;color:var(--gray-4);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.hc-header strong{font-size:0.85rem;color:var(--success);font-weight:500}
.mini-row{background:var(--white);border:1px solid var(--gray-2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.mini-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mini-dot.g{background:#4caf50}.mini-dot.o"></div><span class="mini-name">Pedro Alves</span><span class="mini-time">11:15</span></div>
      <div class="mini-row"><div class="mini-dot gr"></div><span class="mini-name">Mateus Lima</span><span class="mini-time">13:00</span></div>
    </div>
  </section>
  <section class="features">
    <div class="feat"><div class="feat-num">01</div><h3>Agenda em tempo real</h3><p>Confirme ou cancele agendamentos. Bloqueie horários com um clique.</p></div>
    <div class="feat"><div class="feat-num">02</div><h3>Link exclusivo</h3><p>Cada barbeiro tem um link próprio para compartilhar com seus clientes.</p></div>
    <div class="feat"><div class="feat-num">03</div><h3>Multi-barbeiro</h3><p>Cada profissional gerencia só a sua barbearia, de forma independente.</p></div>
  </section>
  <div class="l-cta">
    <h2>Pronto para começar?</h2>
    <p>Acesse o sistema e configure sua barbearia em minutos.</p>
    <button class="btn btn-line" onclick="showAuth()">Entrar agora →</button>
  </div>
  <footer class="l-footer"><small>© 2026 BarberApp</small></footer>
</div>

<div id="auth">
  <div class="auth-box">
    <button class="auth-back" onclick="showView('landing')">← Voltar</button>
    <div class="auth-icon">✂</div>
    <h2 id="auth-title">Entrar na conta</h2>
    <p id="auth-sub">Acesse seu painel ou crie sua conta</p>
    <div id="auth-msg"></div>

    <div class="field reg-field" style="display:none;"><label>Nome Completo</label><input class="inp" type="text" id="auth-nome" placeholder="Seu nome completo"/></div>
    <div class="field reg-field" style="display:none;"><label>WhatsApp</label><input class="inp" type="text" id="auth-whatsapp" placeholder="(32) 99999-9999"/></div>

    <div class="field"><label>E-mail</label><input class="inp" type="email" id="auth-email" placeholder="seu@email.com"/></div>
    
    <div class="field log-field">
      <label style="display:flex; justify-content:space-between;">
        Senha 
        <span style="color:var(--gray-4); cursor:pointer; text-decoration:underline; font-size: 0.75rem;" onclick="toggleRecuperacao()">Esqueci a senha</span>
      </label>
      <input class="inp" type="password" id="auth-senha" placeholder="••••••••"/>
    </div>

    <button class="btn btn-dark btn-full" id="auth-btn" onclick="handleAuth()">Entrar</button>
    <div class="auth-toggle" id="auth-toggle-btn" onclick="toggleAuthMode()">Novo por aqui? <span>Cadastre-se</span></div>
    <div class="auth-toggle" id="auth-back-log" style="display:none;" onclick="voltarLogin()">← Voltar ao Login</div>
  </div>
</div>

<div id="nova-senha" class="view" style="display:none; min-height:100vh; align-items:center; justify-content:center; background:var(--bg); padding:2rem;">
  <div class="auth-box">
    <div class="auth-icon">🔒</div>
    <h2>Nova Senha</h2>
    <p>Digite sua nova senha de acesso abaixo.</p>
    <div id="ns-msg"></div>
    <div class="field"><label>Nova Senha</label><input class="inp" type="password" id="ns-senha" placeholder="••••••••"/></div>
    <button class="btn btn-dark btn-full" id="ns-btn" onclick="atualizarSenha()">Atualizar Senha</button>
  </div>
</div>

<div id="barber">
  <aside class="sidebar">
    <div class="sb-brand">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">✂</div>
        <div>
          <div id="sb-nome" style="font-weight:600;font-size:0.9rem">Minha Barbearia</div>
          <div id="sb-email" class="sb-email-txt"></div>
        </div>
      </div>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" onclick="setPanel(this,'dashboard')"><span class="sb-ic">⊞</span> Dashboard</button>
      <button class="sb-item" onclick="setPanel(this,'agenda')"><span class="sb-ic">📅</span> Agendamentos</button>
      <button class="sb-item" onclick="setPanel(this,'servicos')"><span class="sb-ic">✂️</span> Serviços</button>
      <button class="sb-item" onclick="setPanel(this,'equipe')"><span class="sb-ic">👥</span> Barbeiros</button>
      <button class="sb-item" onclick="setPanel(this,'horarios')"><span class="sb-ic">🔒</span> Bloquear Horários</button>
      <button class="sb-item" onclick="setPanel(this,'config')"><span class="sb-ic">⚙️</span> Configurações</button>
    </nav>
    <button class="sb-out" onclick="signOut()">← Sair</button>
  </aside>

  <main class="b-main">

    <div id="panel-dashboard" class="panel active">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.75rem;flex-wrap:wrap;gap:12px">
        <div>
          <p style="font-size:0.8rem;color:var(--gray-4);margin-bottom:4px" id="dash-data"></p>
          <h2 style="font-size:1.4rem;font-weight:600">Bem-vindo, <span id="dash-nome">barbeiro</span>!</h2>
        </div>
        <div id="link-wrap" style="display:none">
          <div class="link-box"><span style="font-size:0.75rem;color:var(--gray-4);margin-right:4px">🔗</span><code id="link-txt"></code><button class="btn btn-dark btn-sm" onclick="copiarLink()" style="margin-left:8px;padding:6px 12px">Copiar</button></div>
        </div>
      </div>

      <div class="dash-cards">
        <div class="dash-card" style="--cc:#e8f0fe;--ci:#1a56db">
          <div class="dc-icon" style="background:#1a56db">📅</div>
          <div class="dc-label">Agendamentos Hoje</div>
          <div class="dc-val" id="st-total">0</div>
        </div>
        <div class="dash-card" style="--cc:#e8f5e8;--ci:#2d6a2d">
          <div class="dc-icon" style="background:#2d6a2d">👥</div>
          <div class="dc-label">Clientes Ativos</div>
          <div class="dc-val" id="st-clientes">0</div>
        </div>
        <div class="dash-card" style="--cc:#f0e8fe;--ci:#6b21a8">
          <div class="dc-icon" style="background:#6b21a8">✂</div>
          <div class="dc-label">Barbeiros</div>
          <div class="dc-val" id="st-barbs">0</div>
        </div>
        <div class="dash-card" style="--cc:#fff8e8;--ci:#b45309">
          <div class="dc-icon" style="background:#b45309">★</div>
          <div class="dc-label">Serviços</div>
          <div class="dc-val" id="st-svcs">0</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 320px;gap:1.25rem;margin-top:1.25rem">
        <div>
          <div class="card" style="margin-bottom:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.25rem">
              <span>📅</span>
              <h3 style="font-size:1rem;font-weight:600">Agenda</h3>
            </div>

            <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.25rem">
              <button class="btn btn-line btn-sm btn-icon" onclick="mudarDia(-1)">‹</button>
              <div id="semana-strip" style="display:flex;gap:6px;flex:1;overflow-x:auto;padding:2px 0"></div>
              <button class="btn btn-line btn-sm btn-icon" onclick="mudarDia(1)">›</button>
            </div>

            <div style="text-align:center;font-size:1.1rem;font-weight:600;margin-bottom:1.25rem;color:var(--black)" id="agenda-data-titulo"></div>
            <div id="agenda-lista"><div class="ag-empty">Nenhum agendamento neste dia.</div></div>
            <button class="btn btn-dark btn-full" style="margin-top:1rem" onclick="setPanel(null,'agenda')">+ Novo Agendamento</button>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:1.25rem">
          <div class="card">
            <h3 style="font-size:0.85rem;font-weight:600;margin-bottom:1rem;color:var(--gray-5)">⚡ Resumo do Dia</h3>
            <div style="display:flex;flex-direction:column;gap:10px">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:0.85rem;color:var(--gray-4)">Confirmados</span>
                <span id="st-conf" style="font-weight:600;font-size:0.95rem">0</span>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:0.85rem;color:var(--gray-4)">Pendentes</span>
                <span id="st-pend" style="font-weight:600;font-size:0.95rem;color:var(--warn)">0</span>
              </div>
              <div style="border-top:1px solid var(--gray-1);padding-top:10px;display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:0.85rem;color:var(--gray-4)">Faturamento</span>
                <span id="st-fat" style="font-weight:700;font-size:1.1rem;color:var(--success)">R$ 0</span>
              </div>
            </div>
          </div>

          <div class="card">
            <h3 style="font-size:0.85rem;font-weight:600;margin-bottom:1rem;color:var(--gray-5)">🕐 Grade de Horários</h3>
            <div id="grade-horarios" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
            <div style="display:flex;flex-direction:column;gap:5px;margin-top:10px">
              <span style="display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--gray-4)"><span style="width:8px;height:8px;border-radius:2px;background:var(--success-bg);border:1px solid var(--success);display:inline-block"></span>Confirmado</span>
              <span style="display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--gray-4)"><span style="width:8px;height:8px;border-radius:2px;background:var(--warn-bg);border:1px solid var(--warn);display:inline-block"></span>Pendente</span>
              <span style="display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--gray-4)"><span style="width:8px;height:8px;border-radius:2px;background:var(--gray-1);border:1px solid var(--gray-2);display:inline-block"></span>Livre</span>
              <span style="display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--gray-4)"><span style="width:8px;height:8px;border-radius:2px;background:var(--danger-bg);border:1px solid var(--danger);display:inline-block"></span>Bloqueado</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-agenda" class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px">
        <h2 class="panel-title" style="margin:0">Agendamentos</h2>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap">
        <button class="btn btn-line btn-sm" onclick="mudarDia(-1)">←</button>
        <input type="date" class="inp" id="agenda-dia" style="width:auto;padding:8px 12px;font-size:0.88rem" onchange="renderStats();renderAgenda();renderGrade();renderSemana()"/>
        <button class="btn btn-line btn-sm" onclick="mudarDia(1)">→</button>
        <button class="btn btn-ghost btn-sm" onclick="irHoje()">Hoje</button>
        <span id="agenda-dia-label" style="font-size:0.88rem;color:var(--gray-4)"></span>
      </div>
      <div class="card"><div id="agenda-lista-2"><div class="ag-empty">Nenhum agendamento neste dia.</div></div></div>
    </div>

    <div id="panel-horarios" class="panel">
      <h2 class="panel-title">Bloquear Horários</h2>
      <div class="grid-2">
        <div class="card">
          <h3 style="font-size:0.95rem;margin-bottom:1rem">Novo bloqueio</h3>
          <div class="field"><label>Início</label><input class="inp" type="datetime-local" id="blq-ini"/></div>
          <div class="field"><label>Fim</label><input class="inp" type="datetime-local" id="blq-fim"/></div>
          <div class="field"><label>Motivo (opcional)</label><input class="inp" type="text" id="blq-mot" placeholder="Ex: Almoço"/></div>
          <button class="btn btn-dark btn-full" onclick="bloquear()">Bloquear</button>
        </div>
        <div class="card">
          <h3 style="font-size:0.95rem;margin-bottom:1rem">Bloqueios ativos</h3>
          <div id="bloqueios-lista"><p style="color:var(--gray-4);font-size:0.88rem">Nenhum bloqueio.</p></div>
        </div>
      </div>
    </div>

    <div id="panel-servicos" class="panel">
      <h2 class="panel-title">Serviços</h2>
      <div class="grid-2">
        <div class="card">
          <h3 style="font-size:0.95rem;margin-bottom:1rem">Novo serviço</h3>
          <div class="field" id="wrap-sv-barb" style="display:none">
            <label>Barbeiro</label>
            <select class="inp" id="sv-barb"></select>
          </div>
          <div class="field"><label>Nome</label><input class="inp" type="text" id="sv-nome" placeholder="Ex: Degradê navalhado"/></div>
          <div class="field"><label>Preço (R$)</label><input class="inp" type="number" id="sv-preco" placeholder="45"/></div>
          <div class="field"><label>Duração (min)</label><input class="inp" type="number" id="sv-dur" placeholder="30"/></div>
          <button class="btn btn-dark btn-full" onclick="addServico()">Salvar serviço</button>
        </div>
        <div class="card">
          <h3 style="font-size:0.95rem;margin-bottom:1rem">Serviços ativos</h3>
          <div id="servicos-lista"><p style="color:var(--gray-4);font-size:0.88rem">Nenhum serviço.</p></div>
        </div>
      </div>
    </div>

    <div id="panel-equipe" class="panel">
      <h2 class="panel-title">Barbeiros</h2>
      <div class="grid-2">
        <div class="card">
          <h3 style="font-size:0.95rem;margin-bottom:0.5rem">Adicionar barbeiro</h3>
          <p style="font-size:0.82rem;color:var(--gray-4);margin-bottom:1rem">O barbeiro receberá acesso ao sistema com e-mail e senha próprios.</p>
          <div class="field"><label>Nome</label><input class="inp" type="text" id="eq-nome" placeholder="Ex: João Silva"/></div>
          <div class="field"><label>E-mail de acesso</label><input class="inp" type="email" id="eq-email" placeholder="joao@email.com"/></div>
          <div class="field"><label>Especialidade</label><input class="inp" type="text" id="eq-esp" placeholder="Ex: Cortes modernos"/></div>
          <button class="btn btn-dark btn-full" onclick="addBarbeiro()">Adicionar barbeiro</button>
          <div id="eq-msg" style="margin-top:10px"></div>
        </div>
        <div class="card">
          <h3 style="font-size:0.95rem;margin-bottom:1rem">Equipe atual</h3>
          <div id="equipe-lista"><p style="color:var(--gray-4);font-size:0.88rem">Nenhum barbeiro.</p></div>
        </div>
      </div>
    </div>

    <div id="panel-config" class="panel">
      <h2 class="panel-title">Configurações</h2>
      <div class="card" style="max-width:500px">
        <div id="cfg-msg"></div>
        <div class="field"><label>Nome da barbearia</label><input class="inp" type="text" id="cfg-nome" placeholder="Barbearia do João"/></div>
        <div class="field"><label>Endereço</label><input class="inp" type="text" id="cfg-end" placeholder="Rua das Flores, 123"/></div>
        <div class="field"><label>Telefone / WhatsApp</label><input class="inp" type="text" id="cfg-tel" placeholder="(11) 99999-9999"/></div>
        <div class="field">
          <label>Slug (link do cliente)</label>
          <input class="inp" type="text" id="cfg-slug" placeholder="barbearia-do-joao" oninput="previewLink()"/>
          <small id="cfg-preview" style="margin-top:5px;color:var(--gray-4)"></small>
        </div>
        <button class="btn btn-dark" id="cfg-btn" onclick="salvarBarbearia()">Salvar configurações</button>
      </div>
    </div>

  </main>
</div>

<div id="cliente">
  <header class="cli-header">
    <div>
      <h3 id="cli-nome">Carregando...</h3>
      <small id="cli-end"></small>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <small id="cli-email"></small>
      <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="signOut()">Sair</button>
    </div>
  </header>
  <div class="cli-body">
    <div class="card" style="margin-bottom:1.25rem">
      <h2 style="font-family:var(--serif);font-weight:400;font-size:1.4rem;margin-bottom:4px">Agendar horário</h2>
      <p style="font-size:0.85rem;margin-bottom:1.25rem;color:var(--gray-4)">Escolha o barbeiro, serviço e horário disponível.</p>
      <div class="steps-bar">
        <div class="step-seg on" id="s1"></div>
        <div class="step-seg" id="s2"></div>
        <div class="step-seg" id="s3"></div>
        <div class="step-seg" id="s4"></div>
      </div>
      <div id="cli-msg"></div>

      <div id="etapa-1">
        <p style="font-size:0.78rem;color:var(--gray-4);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500">Escolha o barbeiro</p>
        <div id="barbs-cli"></div>
        <button class="btn btn-dark btn-full" style="margin-top:10px" id="btn-e1" onclick="irE(2)" disabled>Continuar →</button>
      </div>

      <div id="etapa-2" style="display:none">
        <p style="font-size:0.78rem;color:var(--gray-4);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500">Escolha o serviço</p>
        <div id="svcs-cli"></div>
        <div style="display:flex;gap:10px;margin-top:10px">
          <button class="btn btn-line" onclick="irE(1)">← Voltar</button>
          <button class="btn btn-dark" style="flex:1" id="btn-e2" onclick="irE(3)" disabled>Continuar →</button>
        </div>
      </div>

      <div id="etapa-3" style="display:none">
        <p style="font-size:0.78rem;color:var(--gray-4);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500">Escolha o dia</p>
        <div class="field"><label>Data</label><input class="inp" type="date" id="cli-dia" onchange="renderHorarios()"/></div>
        <div id="horarios-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0"></div>

const getDiaLocal = (iso) => {

const slug = _parts.length >= 2 ? _parts[_parts.length-1] : null

;(async()=>{

async function iniciar(s){
  session=s
  const email=s.user.email.toLowerCase().trim()

  const {data:bDono}=await sb.from('barbearias').select('id').eq('owner_id',s.user.id).maybeSingle()
  if(bDono){ role='dono'; await loadBarbeiro(); return }

  const {data:bBarb}=await sb.from('barbeiros').select('*,barbearias(*)').eq('email',email).maybeSingle()
  if(bBarb){
    if(!bBarb.user_id){
      await sb.from('barbeiros').update({user_id:s.user.id}).eq('id',bBarb.id)
      bBarb.user_id=s.user.id
    }
    role='barbeiro'; await loadBarbeiroFuncionario(bBarb); return
  }

  role='cliente'; await loadCliente()
}

async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim()
  const senha=document.getElementById('auth-senha').value
  const btn=document.getElementById('auth-btn')
  btn.disabled=true; btn.textContent='Processando...'
  document.getElementById('auth-msg').innerHTML=''
  try{
    if(authMode==='recuperacao'){
      const {error} = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });
      if(error) throw error;
      document.getElementById('auth-msg').innerHTML='<div class="msg msg-ok">E-mail enviado! Verifique sua caixa de entrada.</div>';
      return;
    }
    else if(authMode==='login'){
      const {error}=await sb.auth.signInWithPassword({email,password:senha})
      if(error) throw error
    } else {
      const nome=document.getElementById('auth-nome').value.trim()
      const whatsapp=document.getElementById('auth-whatsapp').value.trim()
      if(!nome || !whatsapp) throw new Error('Nome e WhatsApp são obrigatórios para o cadastro.');

      const {data, error}=await sb.auth.signUp({email,password:senha})
      if(error) throw error
      
      if(data?.user) {
        const {error: profileErr} = await sb.from('clientes').insert([
          { id: data.user.id, nome: nome, whatsapp: whatsapp }
        ])
        if(profileErr) throw profileErr
      }

      document.getElementById('auth-msg').innerHTML='<div class="msg msg-ok">Conta criada! Faça login.</div>'
      authMode='login'; toggleAuthMode(); return
    }
  } catch(e){
    const m={'Invalid login credentials':'E-mail ou senha incorretos.','User already registered':'E-mail já cadastrado.','Password should be at least 6 characters':'A senha precisa ter 6+ caracteres.'}
    document.getElementById('auth-msg').innerHTML=`<div class="msg msg-err">${m[e.message]||e.message}</div>`
  } finally { btn.disabled=false; btn.textContent=authMode==='login'?'Entrar':(authMode==='recuperacao'?'Enviar e-mail':'Criar conta') }
}

async function atualizarSenha() {
  const btn = document.getElementById('ns-btn');
  const senha = document.getElementById('ns-senha').value;
  if(!senha || senha.length < 6) {
    document.getElementById('ns-msg').innerHTML = '<div class="msg msg-err">A senha deve ter pelo menos 6 caracteres.</div>';
    return;
  }
  btn.disabled = true; btn.textContent = 'Atualizando...';
  const { error } = await sb.auth.updateUser({ password: senha });
  btn.disabled = false; btn.textContent = 'Atualizar Senha';
  
  if(error) {
    document.getElementById('ns-msg').innerHTML = `<div class="msg msg-err">${error.message}</div>`;
  } else {
    alert('Senha atualizada com sucesso!');
    window.location.hash = ''; // Limpa os tokens da URL
    window.location.reload(); // Reinicia o app limpo e logado
  }
}

      .order('data_hora'),
    sb.from('servicos').select('*')
      .eq('barbearia_id',barbearia.id)
      .eq('barbeiro_id',meuBarbeiro.id),
    sb.from('horarios_bloqueados').select('*')
      .eq('barbearia_id',barbearia.id)

function renderStats(){
  const diaSel=(document.getElementById('agenda-dia')?.value)||new Date().toISOString().split('T')[0]
  const dodia=agendamentos.filter(a=>getDiaLocal(a.data_hora)===diaSel)
  
  const conf=dodia.filter(a=>a.status==='confirmado')
  const pend=dodia.filter(a=>a.status==='pendente')
  const fat=conf.reduce((s,a)=>s+(a.servicos?.preco||0),0)
  
  const el=id=>document.getElementById(id)
  if(el('st-total')) el('st-total').textContent=dodia.length
  if(el('st-pend'))  el('st-pend').textContent=pend.length
  if(el('st-conf'))  el('st-conf').textContent=conf.length
  if(el('st-fat'))   el('st-fat').textContent=`R$ ${fat.toFixed(2)}`
  
  const clientesUnicos=new Set(agendamentos.map(a=>a.user_id)).size
  if(el('st-clientes')) el('st-clientes').textContent=clientesUnicos
}

function renderSemana(){
  const strip=document.getElementById('semana-strip')
  if(!strip) return
  const diaSel=(document.getElementById('agenda-dia')?.value)||new Date().toISOString().split('T')[0]
  const hoje=new Date().toISOString().split('T')[0]
  const siglas=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  const dias=[]
  const base=new Date(diaSel+'T12:00:00')
  for(let i=-3;i<=3;i++){
    const d=new Date(base); d.setDate(d.getDate()+i)
    dias.push(d.toISOString().split('T')[0])
  }
  strip.innerHTML=dias.map(d=>{
    const dt=new Date(d+'T12:00:00')
    const ativo=d===diaSel
    const eh=d===hoje
    return `<div class="sem-dia${ativo?' ativo':eh?' hoje':''}" onclick="selecionarDia('${d}')">
      <div class="sem-sigla">${siglas[dt.getDay()]}</div>
      <div class="sem-num">${dt.getDate()}</div>
    </div>`
  }).join('')
  const tit=document.getElementById('agenda-data-titulo')
  if(tit){
    const dt=new Date(diaSel+'T12:00:00')
    tit.textContent=dt.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'})
  }
  const lbl=document.getElementById('agenda-dia-label')
  if(lbl){
    const dt=new Date(diaSel+'T12:00:00')
    let txt=dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})
    if(diaSel===hoje) txt='Hoje — '+txt
    lbl.textContent=txt
  }
}

function selecionarDia(d){
  const inp=document.getElementById('agenda-dia')
  if(inp) inp.value=d
  renderStats(); renderAgenda(); renderGrade(); renderSemana()
}

function renderAgenda(){
  const diaSel=(document.getElementById('agenda-dia')?.value)||new Date().toISOString().split('T')[0]
  const dodia=agendamentos.filter(a=>getDiaLocal(a.data_hora)===diaSel)
    .sort((a,b)=>new Date(a.data_hora)-new Date(b.data_hora))

  const html=dodia.length ? dodia.map(a=>{
    const hr=new Date(a.data_hora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    const bc=a.status==='confirmado'?'badge-ok':a.status==='cancelado'?'badge-err':'badge-warn'
    return `<div class="ag-card" onclick="abrirModal('${a.id}')">
      <div class="ag-card-top"><span class="ag-card-nome">${a.nome_cliente}</span><span class="badge ${bc}">${a.status}</span></div>
      <div class="ag-card-info"><small>✂ ${a.servicos?.nome||'—'}</small><small>👤 ${a.barbeiros?.nome||'—'}</small><small>🕐 ${hr}</small></div>
    </div>`
  }).join('') : '<div class="ag-empty">Nenhum agendamento neste dia.</div>'

  const el1=document.getElementById('agenda-lista')
  const el2=document.getElementById('agenda-lista-2')
  if(el1) el1.innerHTML=html
  if(el2) el2.innerHTML=html
}

function renderGrade(){
  const el=document.getElementById('grade-horarios')
  if(!el) return
  const diaSel=(document.getElementById('agenda-dia')?.value)||new Date().toISOString().split('T')[0]

  const slots=[]
  for(let h=8;h<20;h++)
    for(let m=0;m<60;m+=30)
      slots.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'))

  el.innerHTML=slots.map(slot=>{
    const dtSlot=new Date(diaSel+'T'+slot+':00')
    const ag=agendamentos.find(a=>{
      if(a.status==='cancelado') return false
      return Math.abs(new Date(a.data_hora)-dtSlot)<60000
    })
    const blq=bloqueios.find(b=>dtSlot>=new Date(b.data_hora_inicio)&&dtSlot<new Date(b.data_hora_fim))

    let bg,border,color,txt,cursor,onclick
    if(blq){
      bg='var(--danger-bg)';border='var(--danger)';color='var(--danger)';txt=slot;cursor='default';onclick=''
    } else if(ag){
      const isConf=ag.status==='confirmado'
      bg=isConf?'var(--success-bg)':'var(--warn-bg)'
      border=isConf?'var(--success)':'var(--warn)'
      color=isConf?'var(--success)':'var(--warn)'
      txt=slot;cursor='pointer'
      onclick=`onclick="abrirModal('${ag.id}')"`
    } else {
      bg='var(--gray-1)';border='var(--gray-2)';color='var(--gray-4)';txt=slot;cursor='default';onclick=''
    }

    return `<div ${onclick} style="padding:9px 4px;border-radius:8px;background:${bg};border:1px solid ${border};text-align:center;font-size:0.8rem;font-weight:500;color:${color};cursor:${cursor}">${txt}${ag?`<div style="font-size:0.65rem;margin-top:2px;opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ag.nome_cliente.split('@')[0]}</div>`:''}</div>`
  }).join('')
}

function mudarDia(delta){
  const inp=document.getElementById('agenda-dia')
  const dt=new Date((inp?.value||new Date().toISOString().split('T')[0])+'T12:00:00')
  dt.setDate(dt.getDate()+delta)
  if(inp) inp.value=dt.toISOString().split('T')[0]
  renderStats(); renderAgenda(); renderGrade(); renderSemana()
}

function irHoje(){
  const inp=document.getElementById('agenda-dia')

  renderStats(); renderAgenda(); renderGrade(); renderSemana()
}

let _agModal=null
function abrirModal(id){
  _agModal=agendamentos.find(a=>a.id===id)
  if(!_agModal) return
  const dt=new Date(_agModal.data_hora).toLocaleString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
  document.getElementById('m-cliente').textContent=_agModal.nome_cliente
  document.getElementById('m-servico').textContent=_agModal.servicos?.nome||'—'
  document.getElementById('m-barbeiro').textContent=_agModal.barbeiros?.nome||'—'
  document.getElementById('m-data').textContent=dt
  const bc=_agModal.status==='confirmado'?'badge-ok':_agModal.status==='cancelado'?'badge-err':'badge-warn'
  document.getElementById('m-status').innerHTML=`<span class="badge ${bc}">${_agModal.status}</span>`
  const acoes=document.getElementById('m-acoes')
  acoes.innerHTML=''
  if(_agModal.status==='pendente'){
    acoes.innerHTML+=`<button class="btn btn-dark" style="flex:1" onclick="confAg('${_agModal.id}');fecharModal()">✓ Confirmar</button>`
  }
  if(_agModal.status!=='cancelado'){
    acoes.innerHTML+=`<button class="btn btn-danger" style="flex:1" onclick="cancAg('${_agModal.id}');fecharModal()">✕ Cancelar</button>`
  }
  acoes.innerHTML+=`<button class="btn btn-line" onclick="fecharModal()">Fechar</button>`
  document.getElementById('modal-ag').classList.add('open')
}

function fecharModal(e){
  if(!e||e.target===document.getElementById('modal-ag')){
    document.getElementById('modal-ag').classList.remove('open')
  }
}

function renderEquipe(barbs){
  const el=document.getElementById('equipe-lista')
  if(!barbs.length){el.innerHTML='<p style="color:var(--gray-4);font-size:0.88rem">Nenhum barbeiro.</p>';return}
  el.innerHTML=barbs.map(b=>`
    <div class="svc-row">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--gray-2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">✂</div>
      <div style="flex:1">
        <div style="font-weight:500;font-size:0.9rem">${b.nome}</div>
        <div style="font-size:0.75rem;color:var(--gray-4)">${b.email||'Sem e-mail'} · ${b.especialidade||'—'}</div>
        <div style="font-size:0.72rem;margin-top:2px">
          ${b.user_id
            ? '<span style="color:var(--success);font-weight:500">✓ Conta ativa</span>'
            : '<span style="color:var(--warn)">⏳ Aguardando primeiro acesso</span>'}
        </div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="remBarbeiro('${b.id}')">✕</button>
    </div>`).join('')
}

async function addBarbeiro(){
  if(!barbearia){alert('Salve a barbearia primeiro.');return}
  const nome=document.getElementById('eq-nome').value.trim()
  const email=document.getElementById('eq-email').value.trim().toLowerCase()
  const esp=document.getElementById('eq-esp').value.trim()
  const msgEl=document.getElementById('eq-msg')

  if(!nome||!email){
    msgEl.innerHTML='<div class="msg msg-err">Nome e e-mail são obrigatórios.</div>'
    return
  }

  msgEl.innerHTML='<div class="msg" style="background:var(--gray-1);color:var(--gray-5)">Salvando...</div>'

  const {data:convite,error:ce}=await sb.from('convites').upsert([{
    email, barbearia_id:barbearia.id, nome
  }],{onConflict:'email'}).select().single()

  if(ce){ msgEl.innerHTML=`<div class="msg msg-err">${ce.message}</div>`; return }

  const {error:be}=await sb.from('barbeiros').insert([{
    nome, email, especialidade:esp,
    barbearia_id:barbearia.id,
    convite_id:convite.id
  }])

  if(be){ msgEl.innerHTML=`<div class="msg msg-err">${be.message}</div>`; return }

  msgEl.innerHTML=`<div class="msg msg-ok">Barbeiro adicionado! Peça para <strong>${email}</strong> criar uma conta no sistema.</div>`
  document.getElementById('eq-nome').value=''
  document.getElementById('eq-email').value=''
  document.getElementById('eq-esp').value=''
  await recarregar()
}

async function remBarbeiro(id){
  if(!confirm('Remover barbeiro? Ele perderá o acesso ao sistema.'))return
  const {data:barb}=await sb.from('barbeiros').select('convite_id,email').eq('id',id).single()
  await sb.from('barbeiros').delete().eq('id',id)
  if(barb?.convite_id) await sb.from('convites').delete().eq('id',barb.convite_id)
  await recarregar()
}

function renderServicos(){
  const el=document.getElementById('servicos-lista')
  if(!servicos.length){el.innerHTML='<p style="color:var(--gray-4);font-size:0.88rem">Nenhum serviço.</p>';return}
  el.innerHTML=servicos.map(s=>`<div class="svc-row"><div style="flex:1"><div style="font-weight:500;font-size:0.9rem">${s.nome}</div><small style="color:var(--gray-4)">${s.duracao_minutos} min</small></div><span style="font-weight:500">R$ ${s.preco}</span><button class="btn btn-sm btn-danger" onclick="remSv('${s.id}')">✕</button></div>`).join('')
}

function renderBloqueios(){
  const el=document.getElementById('bloqueios-lista')
  if(!bloqueios.length){el.innerHTML='<p style="color:var(--gray-4);font-size:0.88rem">Nenhum bloqueio.</p>';return}
  el.innerHTML=bloqueios.map(b=>{
    const f=dt=>new Date(dt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
    return `<div class="blq-row"><div style="flex:1"><div style="font-weight:500;font-size:0.9rem">${b.motivo}</div><small style="color:var(--gray-4)">${f(b.data_hora_inicio)} → ${f(b.data_hora_fim)}</small></div><button class="btn btn-sm btn-danger" onclick="remBlq('${b.id}')">Remover</button></div>`
  }).join('')
}

function previewLink(){
  const s=document.getElementById('cfg-slug').value
  document.getElementById('cfg-preview').textContent=s?`Link: ${location.origin}/${s}`:''
}
function copiarLink(){ navigator.clipboard.writeText(document.getElementById('link-txt').textContent); alert('Copiado!') }

function setPanel(btn,id){
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'))
  if(btn) btn.classList.add('active')
  else {
    document.querySelectorAll('.sb-item').forEach(b=>{
      if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+id+"'"))
        b.classList.add('active')
    })
  }
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  const p=document.getElementById('panel-'+id)
  if(p) p.classList.add('active')
  window.scrollTo(0,0)
}

async function salvarBarbearia(){
  const btn=document.getElementById('cfg-btn')
  btn.disabled=true; btn.textContent='Salvando...'
  document.getElementById('cfg-msg').innerHTML=''
  const payload={nome:document.getElementById('cfg-nome').value,endereco:document.getElementById('cfg-end').value,telefone:document.getElementById('cfg-tel').value,slug:document.getElementById('cfg-slug').value.trim(),owner_id:session.user.id}
  if(barbearia) payload.id=barbearia.id
  const {data,error}=await sb.from('barbearias').upsert([payload]).select()
  btn.disabled=false; btn.textContent='Salvar configurações'
  if(!error){ barbearia=data[0]; preencherCfg(barbearia); document.getElementById('cfg-msg').innerHTML='<div class="msg msg-ok">Salvo!</div>'; await recarregar() }
  else document.getElementById('cfg-msg').innerHTML=`<div class="msg msg-err">${error.message}</div>`
}

async function addServico(){
  if(!barbearia){alert('Salve a barbearia primeiro.');return}
  const payload={
    nome:document.getElementById('sv-nome').value,
    preco:parseFloat(document.getElementById('sv-preco').value),
    duracao_minutos:parseInt(document.getElementById('sv-dur').value),
    barbearia_id:barbearia.id
  }

  if(meuBarbeiro) {
    payload.barbeiro_id = meuBarbeiro.id;
  } else {
    const selBarbId = document.getElementById('sv-barb').value;
    if(!selBarbId) {
      alert('Por favor, selecione a qual barbeiro este serviço pertence.');
      return;
    }
    payload.barbeiro_id = selBarbId;
  }

  await sb.from('servicos').insert([payload])
  document.getElementById('sv-nome').value=''
  document.getElementById('sv-preco').value=''
  document.getElementById('sv-dur').value=''
  if(meuBarbeiro) await recarregarFuncionario(); else await recarregar()
}

async function remSv(id){ if(!confirm('Remover?'))return; await sb.from('servicos').delete().eq('id',id); if(meuBarbeiro) await recarregarFuncionario(); else await recarregar() }
async function confAg(id){ await sb.from('agendamentos').update({status:'confirmado'}).eq('id',id); if(meuBarbeiro) await recarregarFuncionario(); else await recarregar() }
async function cancAg(id){ if(!confirm('Cancelar agendamento?'))return; await sb.from('agendamentos').update({status:'cancelado'}).eq('id',id); if(meuBarbeiro) await recarregarFuncionario(); else await recarregar() }

async function bloquear(){
  if(!barbearia){alert('Salve a barbearia primeiro.');return}
  const iniRaw = document.getElementById('blq-ini').value;
  const fimRaw = document.getElementById('blq-fim').value;
  if(!iniRaw || !fimRaw) return;
  
  await sb.from('horarios_bloqueados').insert([{
    barbearia_id:barbearia.id,
    data_hora_inicio: new Date(iniRaw).toISOString(),
    data_hora_fim: new Date(fimRaw).toISOString(),
    motivo:document.getElementById('blq-mot').value||'Bloqueado'
  }])
  
  document.getElementById('blq-ini').value=''; 
  document.getElementById('blq-fim').value=''; 
  document.getElementById('blq-mot').value=''
  if(meuBarbeiro) await recarregarFuncionario(); else await recarregar()
}

async function remBlq(id){ await sb.from('horarios_bloqueados').delete().eq('id',id); if(meuBarbeiro) await recarregarFuncionario(); else await recarregar() }

// ── CLIENTE ──
let barbeiros=[], selBarb=null, selSv=null, selHora=null, agsBarb=[], blqsBarb=[], todosServicos=[]

async function loadCliente(){
  showView('cliente')
  
  const { data: cliPerfil } = await sb.from('clientes').select('*').eq('id', session.user.id).maybeSingle()
  if(cliPerfil) {
    dadosCliente = cliPerfil;
    document.getElementById('cli-email').textContent = cliPerfil.nome;
  } else {
    document.getElementById('cli-email').textContent = session.user.email;
  }

  let q=sb.from('barbearias').select('*')
  if(slug) q=q.ilike('slug', slug)
  const {data:b}=await q.limit(1).single()
  if(!b){
    document.getElementById('cli-nome').textContent='Barbearia não encontrada'
    document.getElementById('cli-end').textContent='Verifique o link e tente novamente.'
    document.getElementById('barbs-cli').innerHTML='<p style="color:var(--gray-4);text-align:center;padding:1rem">Link inválido ou barbearia não existe.</p>'
    return
  }
  barbearia=b
  document.getElementById('cli-nome').textContent=b.nome
  document.getElementById('cli-end').textContent=b.endereco||''

  const [{data:sv},{data:barb},{data:ag}]=await Promise.all([
    sb.from('servicos').select('*').eq('barbearia_id',b.id),
    sb.from('barbeiros').select('*').eq('barbearia_id',b.id),
    sb.from('agendamentos').select('*,servicos(nome),barbeiros(nome)').eq('user_id',session.user.id).order('data_hora',{ascending:false})
  ])
  todosServicos=sv||[]; servicos=sv||[]; barbeiros=barb||[]

  selBarb=null; selSv=null; selHora=null
  await irE(1)
  document.getElementById('btn-e1').disabled=true
  document.getElementById('btn-e2').disabled=true
  document.getElementById('btn-e3').disabled=true

  renderBarbsCli()
  renderMeusAgs(ag||[])

  const hoje=new Date().toISOString().split('T')[0]
  document.getElementById('cli-dia').min=hoje
  document.getElementById('cli-dia').value=hoje
}

function renderBarbsCli(){
  const el=document.getElementById('barbs-cli')
  if(!barbeiros.length){
    el.innerHTML='<p style="color:var(--gray-4);text-align:center;padding:1rem">Nenhum barbeiro cadastrado.</p>'
    return
  }
  el.innerHTML=barbeiros.map(b=>`
    <div class="sel-card" id="barb-${b.id}" onclick="selBarb2('${b.id}')">
      <div style="width:38px;height:38px;border-radius:50%;background:var(--gray-1);border:1px solid var(--gray-2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">✂</div>
      <div style="flex:1">
        <div style="font-weight:500;font-size:0.9rem;margin-bottom:2px">${b.nome}</div>
        <div style="font-size:0.78rem;color:var(--gray-4)">${b.especialidade||'Especialista em cortes'}</div>
      </div>
    </div>`).join('')
}

function selBarb2(id){
  selBarb=barbeiros.find(b=>b.id===id)
  document.querySelectorAll('[id^="barb-"]').forEach(c=>c.classList.remove('picked'))
  document.getElementById('barb-'+id).classList.add('picked')
  document.getElementById('btn-e1').disabled=false
  servicos=todosServicos.filter(s=>s.barbeiro_id===id)
}

function renderSvCli(){
  const el=document.getElementById('svcs-cli')
  if(!servicos.length){el.innerHTML='<p style="color:var(--gray-4);text-align:center;padding:1rem">Nenhum serviço disponível.</p>';return}
  selSv=null
  document.getElementById('btn-e2').disabled=true
  el.innerHTML=servicos.map(s=>`
    <div class="sel-card" id="sc-${s.id}" onclick="selSvc('${s.id}')">
      <div style="flex:1">
        <div style="font-weight:500;font-size:0.9rem;margin-bottom:2px">${s.nome}</div>
        <div style="font-size:0.78rem;color:var(--gray-4)">${s.duracao_minutos} min</div>
      </div>
      <span style="font-weight:500;font-size:0.9rem">R$ ${s.preco}</span>
    </div>`).join('')
}

function selSvc(id){
  selSv=servicos.find(s=>s.id===id)
  document.querySelectorAll('[id^="sc-"]').forEach(c=>c.classList.remove('picked'))
  document.getElementById('sc-'+id).classList.add('picked')
  document.getElementById('btn-e2').disabled=false
}

async function renderHorarios(){
  const dia=document.getElementById('cli-dia').value
  if(!dia||!selBarb) return
  selHora=null
  document.getElementById('btn-e3').disabled=true

  const inicio = new Date(dia+'T00:00:00').toISOString();
  const fim = new Date(dia+'T23:59:59').toISOString();

  const [{data:ags},{data:blqs}]=await Promise.all([
    sb.from('agendamentos').select('data_hora,status').eq('barbeiro_id',selBarb.id).gte('data_hora',inicio).lte('data_hora',fim),
    sb.from('horarios_bloqueados').select('data_hora_inicio,data_hora_fim').eq('barbearia_id',barbearia.id).gte('data_hora_inicio',inicio).lte('data_hora_fim',fim)
  ])
  agsBarb=ags||[]; blqsBarb=blqs||[]

  const slots=[]
  for(let h=8;h<20;h++){
    for(let m=0;m<60;m+=30){
      slots.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'))
    }
  }

  const el=document.getElementById('horarios-grid')
  el.innerHTML=slots.map(slot=>{
    const dtSlot=new Date(dia+'T'+slot+':00')
    const ocupado=agsBarb.some(a=>{
      if(a.status==='cancelado') return false
      return Math.abs(new Date(a.data_hora)-dtSlot)<60000
    })
    const bloqueado=blqsBarb.some(b=>dtSlot>=new Date(b.data_hora_inicio)&&dtSlot<new Date(b.data_hora_fim))
    const passado=dtSlot<new Date()

    if(ocupado||bloqueado||passado){
      return `<div style="padding:10px;border-radius:8px;background:var(--gray-1);border:1px solid var(--gray-2);text-align:center;font-size:0.82rem;color:var(--gray-3);text-decoration:${ocupado?'line-through':'none'};cursor:not-allowed">${slot}</div>`
    }
    return `<div id="slot-${slot.replace(':','-')}" onclick="selSlot('${slot}')" style="padding:10px;border-radius:8px;background:var(--white);border:1.5px solid var(--gray-2);text-align:center;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.15s">${slot}</div>`
  }).join('')
}

function selSlot(hora){
  selHora=hora
  document.querySelectorAll('[id^="slot-"]').forEach(el=>{
    el.style.background='var(--white)'
    el.style.color='var(--black)'
    el.style.borderColor='var(--gray-2)'
  })
  const el=document.getElementById('slot-'+hora.replace(':','-'))
  if(el){ el.style.background='var(--black)'; el.style.color='var(--white)'; el.style.borderColor='var(--black)' }
  document.getElementById('btn-e3').disabled=false
}

async function irE(n){
  for(let i=1;i<=4;i++){
    const et=document.getElementById('etapa-'+i)
    if(et) et.style.display=i===n?'block':'none'
    const st=document.getElementById('s'+i)
    if(st) st.classList.toggle('on',i<=n)
  }
  if(n===2) renderSvCli()
  if(n===3){ selHora=null; document.getElementById('btn-e3').disabled=true; await renderHorarios() }
  if(n===4&&selBarb&&selSv&&selHora){
    const dia=document.getElementById('cli-dia').value
    document.getElementById('res-barb').textContent='Barbeiro: '+selBarb.nome
    document.getElementById('res-sv').textContent='Serviço: '+selSv.nome+' — R$ '+selSv.preco
    const dtFmt=new Date(dia+'T'+selHora+':00').toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
    document.getElementById('res-det').textContent=dtFmt+' · '+selSv.duracao_minutos+' min'
    document.getElementById('cli-msg-conf').innerHTML=''
  }
}

async function confirmar(){
  const btn=document.getElementById('btn-conf')
  btn.disabled=true; btn.textContent='Confirmando...'
  const dia=document.getElementById('cli-dia').value
  
  const dataHoraLocal = dia+'T'+selHora+':00';
  const dataHoraParaOBanco = new Date(dataHoraLocal).toISOString();

  const {data:conf}=await sb.from('agendamentos')
    .select('id').eq('barbeiro_id',selBarb.id).eq('data_hora',dataHoraParaOBanco)
    .neq('status','cancelado').maybeSingle()

  if(conf){
    document.getElementById('cli-msg-conf').innerHTML='<div class="msg msg-err">Este horário acabou de ser ocupado. Escolha outro.</div>'
    btn.disabled=false; btn.textContent='Confirmar agendamento'
    return
  }

  const {error}=await sb.from('agendamentos').insert([{
    barbearia_id:barbearia.id,
    user_id:session.user.id,
    servico_id:selSv.id,
    barbeiro_id:selBarb.id,
    nome_cliente: dadosCliente ? dadosCliente.nome : session.user.email.split('@')[0],
    telefone_cliente: dadosCliente ? dadosCliente.whatsapp : '',
    data_hora: dataHoraParaOBanco,
    status:'pendente'
  }])
  
  btn.disabled=false; btn.textContent='Confirmar agendamento'
  if(!error){
    document.getElementById('cli-msg-conf').innerHTML='<div class="msg msg-ok">Agendamento realizado! Aguarde confirmação.</div>'
    setTimeout(()=>loadCliente(), 1500)
  } else {
    document.getElementById('cli-msg-conf').innerHTML='<div class="msg msg-err">Erro ao agendar. Tente novamente.</div>'
  }
}

function renderMeusAgs(ags){
  const el=document.getElementById('meus-ags')
  if(!ags.length){el.innerHTML='<p style="color:var(--gray-4);font-size:0.88rem;text-align:center;padding:1rem">Nenhum agendamento ainda.</p>';return}
  const bm={confirmado:'badge-ok',pendente:'badge-warn',cancelado:'badge-err'}
  el.innerHTML=ags.map(a=>{
    const dt=new Date(a.data_hora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
    const barb=a.barbeiros?.nome?` · ${a.barbeiros.nome}`:''
    return `<div class="tl-item"><div class="tl-dot ${a.status}"></div><div class="tl-body"><div class="tl-top"><span class="tl-name">${a.servicos?.nome||'—'}</span><span class="badge ${bm[a.status]}">${a.status}</span></div><small>${dt}${barb}</small></div></div>`
  }).join('')
}
</script>
