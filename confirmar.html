<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Barbearia BW | Confirmando...</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #0b0b0b; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; font-family: sans-serif; }
        .box { border: 1px solid #d4af37; padding: 40px; border-radius: 20px; }
        .loader { border: 4px solid #161616; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box" id="msg">
        <h2>Confirmando Agendamento...</h2>
        <div class="loader"></div>
    </div>

    <script>
        (function(){ emailjs.init("g_p4I-PMMcMIwbbQA"); })();

        const urlParams = new URLSearchParams(window.location.search);
        const dados = {
            cliente_nome: urlParams.get('nome'),
            cliente_email: urlParams.get('email'),
            servico: urlParams.get('servico'),
            data: urlParams.get('data'),
            horario: urlParams.get('hora')
        };

        // FIX #7: valida parâmetros antes de disparar o e-mail
        if (!dados.cliente_nome || !dados.cliente_email || !dados.servico || !dados.data || !dados.horario) {
            document.getElementById('msg').innerHTML = `
                <h2 style='color:#d4af37'>⚠️ Acesso Inválido</h2>
                <p style='margin-top:10px; color:#a0a0a0'>Esta página só pode ser acessada através do sistema de agendamento.</p>
            `;
        } else {
            emailjs.send("service_jeq2yep", "template_uvobw0r", dados)
                .then(() => {
                    document.getElementById('msg').innerHTML = `
                        <h2 style='color:#d4af37'>✔️ Confirmado!</h2>
                        <p style='margin-top:10px; color:#a0a0a0'>O cliente recebeu o e-mail de confirmação.</p>
                    `;
                })
                .catch(err => {
                    document.getElementById('msg').innerHTML = `
                        <h2 style='color:#ff4444'>❌ Erro ao Confirmar</h2>
                        <p style='margin-top:10px; color:#a0a0a0'>Tente novamente ou contate o suporte.<br><small>${err.text || err}</small></p>
                    `;
                });
        }
    </script>
</body>
</html>
