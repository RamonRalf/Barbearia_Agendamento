<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Confirmando Agendamento - Barbearia BW</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background: #0b0b0b; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { border: 1px solid #d4af37; padding: 40px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="box" id="status">
        <h2>A processar confirmação...</h2>
    </div>

    <script>
        (function(){ 
            emailjs.init("SUA_PUBLIC_KEY_AQUI"); 
        })();

        const urlParams = new URLSearchParams(window.location.search);
        const dados = {
            cliente_nome: urlParams.get('nome'),
            cliente_email: urlParams.get('email'),
            servico: urlParams.get('servico'),
            data: urlParams.get('data'),
            horario: urlParams.get('hora')
        };

        // Envia o e-mail FINAL para o cliente (Usa o Template ID do Cliente)
        emailjs.send("service_jeq2yep", "ID_DO_TEMPLATE_CLIENTE", dados)
            .then(() => {
                document.getElementById('status').innerHTML = `
                    <h2 style='color:#d4af37'>✔️ Confirmado!</h2>
                    <p>O cliente ${dados.cliente_nome} recebeu o e-mail de confirmação.</p>
                `;
            })
            .catch(err => {
                document.getElementById('status').innerHTML = "<h2>Erro na confirmação.</h2>";
            });
    </script>
</body>
</html>
